<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌱 Sistema de Riego Inteligente</title>
  
  <!-- ✅ Firebase SDK en el HEAD (se cargan PRIMERO): -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 1.8em;
    }
    .sensor-card {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sensor-label {
      font-size: 1.1em;
      color: #666;
    }
    .sensor-value {
      font-size: 1.5em;
      font-weight: bold;
      color: #333;
    }
    .estado-agua {
      text-align: center;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      font-weight: bold;
      font-size: 1.2em;
    }
    .estado-falta { background: #ffebee; color: #c62828; }
    .estado-ideal { background: #e8f5e9; color: #2e7d32; }
    .estado-mucha { background: #e3f2fd; color: #1565c0; }
    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .status-online { background: #4caf50; }
    .status-offline { background: #f44336; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌱 Sistema de Riego Inteligente</h1>
    
    <div style="text-align: center; margin-bottom: 20px;">
      <span class="status-indicator" id="statusIndicator"></span>
      <span id="statusText">Conectando...</span>
    </div>
    
    <div class="sensor-card">
      <span class="sensor-label">🌡️ Temperatura</span>
      <span class="sensor-value" id="temp">-- °C</span>
    </div>
    
    <div class="sensor-card">
      <span class="sensor-label">💧 Humedad Aire</span>
      <span class="sensor-value" id="humAire">-- %</span>
    </div>
    
    <div class="sensor-card">
      <span class="sensor-label">🌱 Humedad Suelo</span>
      <span class="sensor-value" id="humSuelo">-- %</span>
    </div>
    
    <div class="estado-agua estado-ideal" id="estadoAgua">
      Cargando datos...
    </div>
    
    <p style="text-align: center; margin-top: 15px; color: #666; font-size: 0.9em;">
      Última actualización: <span id="ultimaActualizacion">--</span>
    </p>
  </div>

  <script>
    // ==== CONFIGURACIÓN DE FIREBASE ====
    const firebaseConfig = {
      // ✅ URL corregida (SIN espacios al final):
      databaseURL: "https://sistema-de-riego-remoto-default-rtdb.firebaseio.com"
    };
    
    // ✅ Inicializar Firebase (CRÍTICO):
    firebase.initializeApp(firebaseConfig);
    
    // Estado local
    let relayState = false;
    let bloqueo = false;
    
    // Conectar a Firebase
    const dbRef = firebase.database().ref();
    
    // Escuchar cambios en sensores
    dbRef.child('sensores').on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        // Temperatura
        if (data.temperatura !== undefined) {
          document.getElementById('temp').textContent = data.temperatura.toFixed(1) + ' °C';
        }
        
        // Humedad Aire
        if (data.humedad_aire !== undefined) {
          document.getElementById('humAire').textContent = data.humedad_aire.toFixed(0) + ' %';
        }
        
        // Humedad Suelo
        if (data.humedad_suelo !== undefined) {
          document.getElementById('humSuelo').textContent = data.humedad_suelo.toFixed(0) + ' %';
          
          // Actualizar estado del agua
          const estadoEl = document.getElementById('estadoAgua');
          estadoEl.className = 'estado-agua';
          if (data.humedad_suelo <= 20) {
            estadoEl.textContent = '⚠️ Falta agua';
            estadoEl.classList.add('estado-falta');
          } else if (data.humedad_suelo >= 80) {
            estadoEl.textContent = '💙 Mucha agua';
            estadoEl.classList.add('estado-mucha');
          } else {
            estadoEl.textContent = '✅ Agua ideal';
            estadoEl.classList.add('estado-ideal');
          }
        }
        
        // Actualizar timestamp
        if (data.ultima_actualizacion) {
          const segundos = Math.floor(data.ultima_actualizacion / 1000);
          document.getElementById('ultimaActualizacion').textContent = segundos + 's';
        }
        
        // Mostrar conectado
        document.getElementById('statusIndicator').className = 'status-indicator status-online';
        document.getElementById('statusText').textContent = 'En línea';
      }
    });
    
    // Manejo de errores de conexión
    dbRef.child('sensores').on('error', (error) => {
      console.error('❌ Error de Firebase:', error.message);
      document.getElementById('statusIndicator').className = 'status-indicator status-offline';
      document.getElementById('statusText').textContent = 'Error de conexión';
    });
  </script>
</body>
</html>
